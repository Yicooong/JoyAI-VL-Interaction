[project]
name = "streamingharness-codex-api"
version = "0.1.0"
description = "用于 JoyVL 后台任务的本地 Codex CLI FastAPI 封装服务"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastapi>=0.115.0",
    "pydantic>=2.12.0",
    "uvicorn[standard]>=0.30.0",
]

[project.scripts]
streamingharness-codex-api = "codex_api.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["codex_api"]
